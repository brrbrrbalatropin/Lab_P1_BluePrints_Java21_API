# Perfil "postgres": persistencia real en PostgreSQL.
# Reactiva la autoconfiguracion de JPA/DataSource excluida en el perfil por defecto.
spring.autoconfigure.exclude=

# Conexion (los valores por defecto coinciden con docker-compose.yml).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/blueprintsdb}
spring.datasource.username=${DB_USER:blueprints}
spring.datasource.password=${DB_PASSWORD:blueprints}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate gestiona el esquema automaticamente (apto para el laboratorio).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
